name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Laravel ${{ matrix.laravel }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - laravel: '9.x'
            php: '8.1'
            testbench: '^7.0'
            phpunit: '^9.5'
            extensions: intl
          - laravel: '10.x'
            php: '8.1'
            testbench: '^8.0'
            phpunit: '^10.5'
            extensions: intl
          - laravel: '11.x'
            php: '8.2'
            testbench: '^9.0'
            phpunit: '^10.5'
            extensions: intl
          - laravel: '12.x'
            php: '8.2'
            testbench: '^10.0'
            phpunit: '^11.5'
            extensions: intl
          - laravel: '13.x'
            php: '8.3'
            testbench: '^11.0'
            phpunit: '^12.5'
            extensions: intl
          - laravel: '13.x'
            php: '8.4'
            testbench: '^11.0'
            phpunit: '^12.5'
            extensions: intl
          - laravel: '13.x'
            php: '8.5'
            testbench: '^11.0'
            phpunit: '^12.5'
            extensions: intl

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Select test dependencies
        run: |
          composer config audit.block-insecure false
          composer require orchestra/testbench:${{ matrix.testbench }} phpunit/phpunit:${{ matrix.phpunit }} --no-update --no-interaction --dev

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
        env:
          COMPOSER_MEMORY_LIMIT: -1

      - name: Run tests
        run: composer test
